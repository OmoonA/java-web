<head>
    <meta charset="UTF-8">

    <script src="../js/test2.js"></script>

    <link rel="stylesheet" href="../css/main.css">

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <!-- 5. 수정함 로고추가 -->
                <a class="navbar-brand" href="http://localhost:8080/">
                    <img src="../images/logo.webp" alt="" width="30" height="24">
                </a>
                <!-- [변경] "Navbar" 텍스트 → 다크/라이트 토글 버튼 -->
                <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">
                    DARK
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">뉴스</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">챔피온</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="main_page_sub/download.html">다운로드</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/login">로그인</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                외부웹사이트
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="https://op.gg/ko">롤전적</a></li>
                                <li><a class="dropdown-item" href="#">불법사이트</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">외부웹</a></li>
                            </ul>
                        </li>
                    </ul>
                    <!-- 6주차 검색 폼 -->
                    <form class="d-flex" role="search" id="searchForm">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"
                            id="searchInput" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
        </div>
    </nav>
    <!-- 네비바 아래 삽입한다. -->
    <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
        <div class="container" style="max-width: 480px;">
            <h2 class="fw-bold mb-4">회원가입</h2>
            <form id="registerForm" action="/register_check" method="post">
                <!-- 아이디 -->
                <div class="mb-3 text-start">
                    <label class="form-label">아이디 *</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="4~20자 영문/숫자"
                        required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>
                <!-- 패스워드 -->
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 *</label>
                    <input type="password" class="form-control" id="password" placeholder="8자 이상, 영문+숫자+특수문자" required>
                </div>
                <!-- 패스워드 확인 -->
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드 확인 *</label>
                    <input type="password" class="form-control" id="passwordConfirm" placeholder="패스워드 재입력" required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                </div>
                <!-- 이메일 -->
                <div class="mb-3 text-start">
                    <label class="form-label">이메일 *</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com"
                        required>
                    <div class="invalid-feedback" id="emailMsg"></div>
                </div>
                <!-- 연락처 -->
                <div class="mb-3 text-start">
                    <label class="form-label">연락처 *</label>
                    <input type="text" class="form-control" id="phone" name="phone" placeholder="010-0000-0000"
                        required>
                    <div class="invalid-feedback" id="phoneMsg"></div>
                </div>
                <input type="hidden" id="hashedPassword" name="password">
                <button type="button" class="btn btn-primary w-100" onclick="validateAndShowModal()">
                    회원가입
                </button>
            </form>
        </div>
    </section>










</body>

</html>
